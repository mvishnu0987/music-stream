kind = "web"
previewPath = "/"
title = "Music App"
version = "1.0.0"
id = "artifacts/music-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19938

[services.development]
run = "pnpm --filter @workspace/music-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-app", "run", "build" ]
publicDir = "artifacts/music-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19938"
BASE_PATH = "/"
